workflows:
  ios-app:
    name: 도시공존 iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: kr.dosigongzon.app
        provisioning_profile_name: "dosigongzon AppStore v2"
      vars:
        XCODE_WORKSPACE: "city-ios/도시공존.xcworkspace"
        XCODE_SCHEME: "도시공존"
        APP_STORE_APPLE_ID: "6786105879"
        BUNDLE_ID: "kr.dosigongzon.app"

    scripts:
      - name: CocoaPods 설치
        script: |
          cd city-ios
          pod install

      - name: 빌드 번호 증가
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-build-number "$APP_STORE_APPLE_ID") + 1))
          cd city-ios
          agvtool new-version -all "$BUILD_NUMBER"

      - name: iOS 빌드
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
