workflows:
  ios-app:
    name: 도시공존 iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: kr.dosigongzon.app
      vars:
        XCODE_WORKSPACE: "city-ios/도시공존.xcworkspace"
        XCODE_SCHEME: "도시공존"
        APP_STORE_APPLE_ID: "6786105879"

    scripts:
      - name: CocoaPods 설치
        script: |
          cd city-ios
          pod install

      - name: iOS 빌드
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
